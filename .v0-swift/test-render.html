<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MDReader preview test</title>
<script>
// Load the presentation.md, then inject into preview frame once it's ready
window.addEventListener('load', async () => {
  const mdResp = await fetch('presentation-sample.md');
  const md = await mdResp.text();
  const iframe = document.getElementById('preview');
  iframe.onload = () => {
    iframe.contentWindow.render(md);
  };
  iframe.src = '../MDReader/Resources/preview.html';
});
</script>
<style>
body { margin: 0; font: 14px -apple-system, sans-serif; }
.bar { padding: 8px 12px; background: #f2f2f7; border-bottom: 1px solid #e5e5ea; }
iframe { border: 0; width: 100%; height: calc(100vh - 37px); }
</style>
</head>
<body>
<div class="bar">MDReader preview pipeline test — loads presentation-sample.md through preview.html</div>
<iframe id="preview"></iframe>
</body>
</html>
