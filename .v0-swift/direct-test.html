<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Direct preview test</title>
<style>
:root { color-scheme: light dark; --fg: #1c1c1e; --bg: #fff; --muted: #6e6e73; --rule: #e5e5ea; --code-bg: #f6f8fa; --link: #007aff; --checkbox-border: #c7c7cc; --checkbox-checked: #34c759; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 17px/1.5 -apple-system, sans-serif; }
#content { padding: 20px 20px 60px; word-wrap: break-word; max-width: 800px; margin: 0 auto; }
h1 { font-size: 28px; } h2 { font-size: 22px; } h3 { font-size: 19px; }
h1,h2,h3,h4 { font-weight: 700; line-height: 1.25; margin: 1.4em 0 0.5em; }
p { margin: 0.75em 0; } hr { border: 0; border-top: 1px solid var(--rule); margin: 1.5em 0; }
code { font-family: "SF Mono", Menlo, monospace; font-size: 15px; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
pre { background: var(--code-bg); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 0.75em 0; }
pre code { background: transparent; padding: 0; font-size: 14px; display: block; }
pre code.hljs { padding: 0; background: transparent; }
blockquote { border-left: 3px solid var(--rule); margin: 0.75em 0; padding: 0.25em 0 0.25em 14px; color: var(--muted); }
ul, ol { padding-left: 24px; margin: 0.5em 0; } li { margin: 0.25em 0; }
ul.contains-task-list { list-style: none; padding-left: 4px; }
li.task-list-item input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--checkbox-border); border-radius: 4px; margin: 0 8px 0 0; vertical-align: -3px; background: var(--bg); position: relative; }
li.task-list-item input[type="checkbox"]:checked { background: var(--checkbox-checked); border-color: var(--checkbox-checked); }
li.task-list-item input[type="checkbox"]:checked::after { content: ""; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
table { border-collapse: collapse; margin: 0.75em 0; width: 100%; font-size: 15px; }
th, td { border: 1px solid var(--rule); padding: 6px 10px; text-align: left; } th { background: var(--code-bg); font-weight: 600; }
.mermaid { background: var(--bg); text-align: center; margin: 1em 0; overflow-x: auto; }
.mermaid svg { max-width: 100%; height: auto; }
a { color: var(--link); text-decoration: none; }
</style>
<link rel="stylesheet" href="../MDReader/Resources/highlight-github.css">
<script src="../MDReader/Resources/marked.min.js"></script>
<script src="../MDReader/Resources/highlight.min.js"></script>
<script src="../MDReader/Resources/mermaid.min.js"></script>
</head>
<body>
<div id="content">Loading...</div>
<script>
(async () => {
  mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose', flowchart: { htmlLabels: true, curve: 'basis' } });
  const renderer = new marked.Renderer();
  const defaultCode = renderer.code.bind(renderer);
  renderer.code = function(code, lang) {
    let text, language;
    if (typeof code === 'object' && code !== null) { text = code.text; language = code.lang; } else { text = code; language = lang; }
    if (language === 'mermaid') return '<pre class="mermaid">' + text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>\n';
    return defaultCode(code, lang);
  };
  marked.use({ renderer, breaks: true, gfm: true });
  const md = await (await fetch('presentation-sample.md')).text();
  const el = document.getElementById('content');
  el.innerHTML = marked.parse(md);
  el.querySelectorAll('pre code[class*="language-"]').forEach(b => { try { hljs.highlightElement(b); } catch(e){} });
  const m = el.querySelectorAll('pre.mermaid');
  if (m.length) { try { await mermaid.run({ nodes: m }); } catch(e) { console.error(e); } }
  document.title = 'DONE';
})();
</script>
</body>
</html>
